## 模板名称: Company-Config-FakeIP-Template.yaml
## 模板版本: 2026.05.13
## 修订日期: 2026-05-13

## 入站端口配置 ---------------------------------------------------------------------------------------------------
mixed-port: 7890 # HTTP+Socks4混合，Win下的系统代理端口
socks-port: 1080 # Socks5，代理端口
port: 8080 # HTTP，代理端口
redir-port: 7891 # 非linux无效，redir 透明代理端口
tproxy-port: 7892 # 非linux无效，tproxy 透明代理端口

## 全局配置 ------------------------------------------------------------------------------------------------
mode: rule # rule（规则）/ global（全局）/ direct（直连）
allow-lan: true # 允许局域网连接
bind-address: "*" # 监听的本地网卡IP地址，*为全部IP地址
log-level: warning # 内核日志级别
ipv6: false # 是否接受ipv6流量
tcp-concurrent: true # TCP并发
#interface-name: en0  # clash流量出站接口，即接口绑定
find-process-mode: strict # 进程匹配模式（off:关闭，always:开启，strict自动），tun模式下无效
lan-allowed-ips: # 允许连接的客户端IP，默认允许全部
  - 0.0.0.0/0
  - ::/0
lan-disallowed-ips: # 禁止连接的IP，优先级高于allow白名单
  - ~
authentication: # http(s)/socks/mixed 的用户验证，格式："user1:pass1"，不写则禁止全部用户
  - ~
skip-auth-prefixes: # 白名单，允许跳过用户验证的IP
  - ~
unified-delay: true # 统一延迟计算，没啥卵用，就是界面好看，会对延迟自动选择策略造成影响
#routing-mark: 6666  # 非linux无效，路由标记，为流量提供标记以供其他应用进行流量处理

## TCP-KeepA-live配置 ------------------------------------------------------------------------------------------
keep-alive-idle: 120 # 触发心跳包的链路无活动阈值，无活动后发送心跳包检测对端是否存活
keep-alive-interval: 15 # 发送心跳包的间隔，无回应则最多重发9次后判断链路关闭
disable-keep-alive: false # 禁用 keep alive，即允许长链接一直存在，安卓端会强制设定为true

## API面板设置---------------------------------------------------------------------------------------------------
external-controller: "[::]:9090" # API面板监听地址
secret: "" #🔴API面板访问密钥
external-ui: ui # API面板静态资源路径
external-ui-name: zashboard # API面板名，配合路径拼接成路径，例如/ui/metacubexd
external-ui-url: "https://ghfast.top/https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip" # API面板下载地址

## 缓存设置
profile:
  store-selected: true # 缓存 API面板 对策略组的选择
  # store-fake-ip: false # redir-host模式下无需缓存fakeip

## 外部资源下载设置---------------------------------------------------------------------------------------------------
# global-client-fingerprint: random # 已废弃，改为在 proxy-providers 中设置
global-ua: clash.meta # 全局UA，默认为clash.meta
etag-support: true # 资源下载的 ETag 支持，使重复资源不会重复下载
geodata-mode: false # GEOIP数据模式，false:mmdb，true:dat，mmdb更新但有设备不支持
geodata-loader: standard # GEO文件加载模式，默认memconservative（小内存设备模式，即分段加载geo数据而不是全部加载）
geo-auto-update: true # GEO文件自动更新
geo-update-interval: 168 # 更新间隔，小时
geox-url: # GEO数据库下载地址，内核会按需下载，未被使用的数据库不会被下载，采用star最多的v2ray项目，修bug很快
  geoip: "https://ghfast.top/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"
  geosite: "https://ghfast.top/https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
  asn: "https://ghfast.top/https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

## DNS设置---------------------------------------------------------------------------------------------------
# 客户端发起网址A的DNS，到达mihomo的DNS模块，mihomo会使用下方的配置进行DNS，得到IP后返回给客户端
# 客户端拿到IP后，再次对IP发起连接请求，此时请求会进入mihomo的规则匹配，根据匹配结果直连或者远端解析
# 也就是说DNS解析实际上会发生两次，第一次的结果并不重要，第二次只要规则正确触发远程解析，绝不会污染和劫持
# 但如果第一次拿到了0.0.0.0,127.0.0.1这样的错误IP，请求无法发给mihomo就会无法访问
# 综上所述，配置DNS没有那么重要，只要保证首次解析不要得到0.0.0.0这样的错误IP即可

public-dns: &public-dns # ✅国内/直连/代理节点解析使用国内 DNS
  # - dhcp://wan
  # - dhcp://eth3
  - 119.29.29.29
  - 223.5.5.5
  # - 114.114.114.114

secure-dns: &secure-dns # ✅策略版：敏感/代理域名使用可信 DoH，并通过默认代理组查询
  # - https://doh.pub/dns-query
  - https://dns.google/dns-query
  - https://cloudflare-dns.com/dns-query
  # - https://8.8.4.4/dns-query
  # - https://1.1.1.1/dns-query

dns:
  enable: true # 启用 dns 模块，否则采用系统 DNS
  listen: "[::]:1053" # DNS 监听端口
  enhanced-mode: fake-ip # ✅保留 Fake-IP 模式
  cache-algorithm: arc
  prefer-h3: false
  ipv6: false # ✅修改：与全局 ipv6:false 保持一致，避免解析 AAAA 但实际 IPv6 不通
  use-hosts: true
  use-system-hosts: true
  respect-rules: false # ✅保留：不用全局 respect-rules，改用 nameserver-policy 精确控制

  # fake-ip 配置段
  fake-ip-range: 198.99.0.1/16
  fake-ip-filter-mode: blacklist # ✅黑名单：命中 filter 返回真实 IP；未命中默认返回 fake-ip
  fake-ip-filter:
    # ✅自定义直连 / DDNS：返回真实 IP
    - "rule-set:custom_ddns"
    - "rule-set:custom_direct"
    - "rule-set:company_custom_direct"

    # ✅内网 / 本地 / 时间同步：返回真实 IP
    - "geosite:private"

    # ✅确定直连且不怕 DNS 污染的国内/系统服务：返回真实 IP
    - "geosite:apple"
    - "geosite:win-update"
    - "geosite:alibaba"
    - "geosite:tencent-games"
    - "geosite:tencent"
    - "geosite:onedrive"
    - "geosite:bilibili"
    - "geosite:bilibili-cdn" # ✅新增：与规则里的 bilibili-cdn 保持一致
    - "geosite:bytedance"
    - "geosite:category-cdn-cn"

    # ⚠️可选：如果你要更接近“国内 real-ip，国外 fake-ip”，再取消下面两行注释
    # - "geosite:geolocation-cn"
    # - "geosite:cn"

    # ✅本地域名：返回真实 IP
    - "address:/+.local/"
    - "address:/+.home.arpa/"
    - "address:/+.lan/"
    - "*.local"
    - "*.lan" # ✅新增：补齐常见局域网后缀

    # ❌不要把 okx / binance / google / github / openai / telegram 放进这里
    # 它们应默认返回 fake-ip，以避免真实 DNS 结果被污染

  # DNS 解析策略段
  default-nameserver: *public-dns # ✅用于解析 DoH 服务器域名，保持国内 DNS
  proxy-server-nameserver: *public-dns # ✅代理节点域名解析固定国内 DNS，避免鸡蛋问题
  direct-nameserver: *public-dns # ✅DIRECT 出口域名解析使用国内 DNS，保证国内 CDN/直连体验
  direct-nameserver-follow-policy: false

  nameserver-policy:
    ## Crypto / 交易所 ---------------------------------------------------------------
    # ✅新增：这些域名虽然默认会返回 fake-ip，但指定可信 DNS 可以降低边界场景污染风险，并兼容后续 redir-host 测试
    "geosite:binance": *secure-dns
    "geosite:okx": *secure-dns
    "rule-set:company_custom_okx": *secure-dns
    "rule-set:company_custom_crypto": *secure-dns
    "rule-set:company_custom_api": *secure-dns

    ## AI ---------------------------------------------------------------------------
    # ✅新增：AI 服务走可信 DoH
    "geosite:openai": *secure-dns
    "geosite:google-gemini": *secure-dns
    "geosite:anthropic": *secure-dns
    "geosite:cursor": *secure-dns
    "geosite:category-ai-!cn": *secure-dns

    ## 常见被污染 / 代理域名 ---------------------------------------------------------
    # ✅新增：常见代理域名走可信 DoH
    "geosite:gfw": *secure-dns
    "geosite:google": *secure-dns
    "geosite:github": *secure-dns
    "geosite:youtube": *secure-dns
    "geosite:telegram": *secure-dns
    "geosite:x": *secure-dns
    "geosite:tiktok": *secure-dns
    "geosite:category-social-media-!cn": *secure-dns
    "rule-set:company_custom_rules": *secure-dns
    "rule-set:custom_rules": *secure-dns

    ## 国内 / 直连 / 局域网 ----------------------------------------------------------
    # ✅新增：国内与直连域名显式走国内 DNS
    "geosite:private": *public-dns
    "geosite:cn": *public-dns
    "geosite:geolocation-cn": *public-dns
    "geosite:apple": *public-dns
    "geosite:microsoft": *public-dns
    "geosite:win-update": *public-dns
    "geosite:alibaba": *public-dns
    "geosite:tencent": *public-dns
    "geosite:tencent-games": *public-dns
    "geosite:onedrive": *public-dns
    "geosite:bilibili": *public-dns
    "geosite:bilibili-cdn": *public-dns
    "geosite:bytedance": *public-dns
    "geosite:category-cdn-cn": *public-dns
    "rule-set:custom_direct": *public-dns
    "rule-set:custom_ddns": *public-dns
    "rule-set:company_custom_direct": *public-dns

  nameserver: *public-dns # ✅默认兜底仍走国内 DNS；需要代理的敏感域名由 nameserver-policy 接管
  # fallback: # 不使用 fallback，避免 DNS 泄露和复杂回退逻辑

